name: Windows Tauri Build

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - components.json
      - index.html
      - package.json
      - package-lock.json
      - tsconfig.json
      - tsconfig.node.json
      - vite.config.ts
      - vitest.config.ts
      - tooling/**
      - src/**
      - src-tauri/**
      - tests/frontend/**
      - .github/workflows/windows-tauri-release.yml
  push:
    branches:
      - "**"
    tags:
      - "v*"
    paths:
      - components.json
      - index.html
      - package.json
      - package-lock.json
      - tsconfig.json
      - tsconfig.node.json
      - vite.config.ts
      - vitest.config.ts
      - tooling/**
      - src/**
      - src-tauri/**
      - tests/frontend/**
      - .github/workflows/windows-tauri-release.yml

permissions:
  contents: read

concurrency:
  group: windows-tauri-${{ github.workflow }}-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  resolve-release-meta:
    name: Resolve Release Metadata
    runs-on: ubuntu-latest
    timeout-minutes: 10

    outputs:
      release_requested: ${{ steps.release_meta.outputs.release_requested }}
      release_tag: ${{ steps.release_meta.outputs.release_tag }}
      release_version: ${{ steps.release_meta.outputs.release_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        run: |
          package_version="$(node -p "require('./package.json').version")"
          release_requested="false"
          release_tag="v${package_version}"
          release_version="${package_version}"

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            release_requested="true"
            release_tag="${GITHUB_REF_NAME}"

            if [[ "${release_tag}" != "v${package_version}" ]]; then
              echo "标签 ${release_tag} 与 package.json 版本 v${package_version} 不一致。" >&2
              exit 1
            fi
          fi

          {
            echo "release_requested=${release_requested}"
            echo "release_tag=${release_tag}"
            echo "release_version=${release_version}"
          } >> "$GITHUB_OUTPUT"

  verify-frontend:
    name: Verify Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Run sensitive path checks
        run: npm run check:sensitive-paths

      - name: Run frontend tests
        run: npm run test

      - name: Run TypeScript checks
        run: npm run typecheck

  verify-rust:
    name: Verify Rust Backend
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build output
        uses: swatinem/rust-cache@v2
        with:
          shared-key: windows-tauri
          workspaces: |
            src-tauri -> target

      - name: Run Rust tests
        run: npm run test:rust

      - name: Run Rust checks
        run: npm run check:rust

  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build output
        uses: swatinem/rust-cache@v2
        with:
          shared-key: windows-tauri
          workspaces: |
            src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Clean build artifacts
        run: npm run clean:artifacts

      - name: Build Windows bundles
        run: npm run build:windows

      - name: Upload Windows bundle artifacts
        uses: actions/upload-artifact@v6
        with:
          compression-level: 0
          name: codex-switch-windows-bundles
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/nsis/*.exe

  publish-release:
    name: Publish GitHub Release
    needs:
      - resolve-release-meta
      - verify-frontend
      - verify-rust
      - build-windows
    if: needs.resolve-release-meta.outputs.release_requested == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Download Windows bundle artifacts
        uses: actions/download-artifact@v7
        with:
          name: codex-switch-windows-bundles
          path: release-artifacts

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ needs.resolve-release-meta.outputs.release_tag }}"
          version="${{ needs.resolve-release-meta.outputs.release_version }}"
          repo="${{ github.repository }}"

          if gh release view "$tag" --repo "$repo" >/dev/null 2>&1; then
            gh release upload "$tag" release-artifacts/*.exe --repo "$repo" --clobber
          else
            gh release create "$tag" release-artifacts/*.exe --repo "$repo" --verify-tag --title "Codex Switch $version" --generate-notes
          fi